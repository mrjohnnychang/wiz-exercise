name: App Container Pipeline
on:
  workflow_run:
    workflows: ["IaC Security Pipeline"]
    types:
      - completed

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/tasky:latest .

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/tasky:latest'
          format: 'table'
          exit-code: '0' # Set to 0 so the deployment continues
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/tasky:latest
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Mirror to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: tasky-app-mirror
          IMAGE_TAG: latest
        run: |
          # Tag the image and push to ECR
          docker tag ghcr.io/${{ github.repository_owner }}/tasky:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name wiz-cluster --region us-west-2
          
          # Inject secrets and the new GHCR image URI into the deployment file
          sed -i "s|PLACEHOLDER_MONGO_URI|${{ secrets.MONGO_URI }}|g" app-deployment.yaml
          sed -i "s|PLACEHOLDER_SECRET_KEY|${{ secrets.SECRET_KEY }}|g" app-deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_URI|ghcr.io/${{ github.repository_owner }}/tasky:latest|g" app-deployment.yaml
          
          kubectl apply -f app-deployment.yaml
