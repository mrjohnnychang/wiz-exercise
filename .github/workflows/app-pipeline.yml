name: App Container Pipeline
on: [push, pull_request]
jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Build Image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/tasky:latest .

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/tasky:latest'
          format: 'table'
          exit-code: '0' # Set to 0 so the deployment continues
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/tasky:latest

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name johnny-test-wiz-cluster --region us-west-2
          kubectl apply -f app-deployment.yaml
